services:
  pocketbase:
    image: ghcr.io/muchobien/pocketbase:latest
    container_name: pocketbase
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8090:8090" # Change both port and PB_PORT in .env for custom ports: "3000:3000"
    volumes:
      - ./pb_data:/pb_data
      - ./pb_public:/pb_public
      - ./pb_migrations:/pb_migrations
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:8092/api/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
