<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<meta http-equiv="X-UA-Compatible" content="ie=edge">
		<title>PocketBean</title>
		<link rel="stylesheet" href="pico.cyan.min.css">
		<link rel="stylesheet" href="style.css">
		<script src="pocketbase.umd.js" defer></script>
		<script src="index.js" defer></script>
	</head>
	<body>
		<div id="wrapper" class="container">
			<header>
				<nav class="flex space-between">
					<ul>
						<li><strong>PocketBean</strong></li>
					</ul>
					<ul>
						<li>
							<details class="dropdown">
								<summary id="account"></summary>
								<ul dir="rtl">
									<li><a id="logout" class="pointer">Logout</a></li>
								</ul>
							</details>
						</li>
					</ul>
				</nav>
			</header>
			<main class="grid grid-xxs">
				<aside>
					<article>
						<nav>
							<ul>
								<li>
									<a id="accounts-btn" class="pointer aside-btn secondary" data-section="accounts">Accounts</a>
								</li>
								<li>
									<a id="currencies-btn" class="pointer aside-btn secondary" data-section="currencies">Currencies</a>
								</li>
								<li>
									<a id="transactions-btn" class="pointer aside-btn" data-section="transactions">Transactions</a>
								</li>
							</ul>
						</nav>
					</article>
				</aside>
				<section id="accounts" class="hide">
					<h2>Accounts <button id="account-add-btn">Add</button></h2>
					<table>
						<thead>
							<tr>
								<th scope="col">Account</th>
								<th scope="col">Currency</th>
							</tr>
						</thead>
						<tbody id="account-list"></tbody>
					</table>
				</section>
				<section id="currencies" class="hide">
					<h2>Currencies <button id="currency-add-btn">Add</button></h2>
					<table>
						<thead>
							<tr>
								<th scope="col">Currency</th>
								<th scope="col">Default</th>
							</tr>
						</thead>
						<tbody id="currency-list"></tbody>
					</table>
				</section>
				<section id="transactions">
					<h2>Transactions <button id="transaction-add-btn">Add</button></h2>
					<table>
						<thead>
							<tr>
								<th scope="col" class="col-width-md">Date</th>
								<th scope="col" class="col-width-sm">Flag</th>
								<th scope="col" class="col-width-lg">Payee</th>
								<th scope="col">Notes</th>
								<th scope="col" class="text-right">Amount</th>
								<th scope="col" class="col-width-sm"></th>
							</tr>
						</thead>
						<tbody id="transaction-list"></tbody>
					</table>
				</section>
			</main>
			<footer></footer>
		</div>

		<form id="login-form" class="container">
			<textarea id="login-error" class="hide" name="login-error" aria-invalid="true" readonly></textarea>
			<fieldset>
				<label>
					Username
					<input id="login-username" name="login-username" placeholder="Username" required>
				</label>
				<label>
					Password
					<input id="login-password" type="password" name="login-password" placeholder="Password" required>
				</label>
			</fieldset>
			<input id="login-submit" type="submit" value="Login">
		</form>

		<dialog id="account-modal">
			<article>
				<header>
					<button class="toggle-modal" aria-label="Close" rel="prev" data-target="account-modal"></button>
					<h2 id="account-title">Account</h2>
				</header>
				<form id="account-form">
					<input type="hidden" id="account-id" name="account-id" value="">
					<input type="hidden" id="account-delete" name="account-delete" value="">
					<textarea id="account-error" class="hide" name="account-error" aria-invalid="true" readonly></textarea>
					<fieldset role="group">
						<input
							type="text"
							id="account-name"
							name="account-payee"
							placeholder="Account:Name"
							aria-label="Account Name"
							required>
						<select
							id="account-currency"
							name="account-currency"
							class="currency-select"
							required></select>
					</fieldset>
				</form>
				<footer>
					<button id="account-open-delete-btn" class="float-left secondary">Delete</button>
					<button id="account-delete-btn" class="float-left danger hide">Delete?</button>
					<button class="toggle-modal secondary" data-target="account-modal">Cancel</button>
					<button id="account-submit" data-target="account-modal" form="account-form">Submit</button>
				</footer>
			</article>
		</dialog>

		<dialog id="currency-modal">
			<article>
				<header>
					<button class="toggle-modal" aria-label="Close" rel="prev" data-target="currency-modal"></button>
					<h2 id="currency-title">Currency</h2>
				</header>
				<form id="currency-form">
					<input type="hidden" id="currency-id" name="currency-id" value="">
					<input type="hidden" id="currency-delete" name="currency-delete" value="">
					<textarea id="currency-error" class="hide" name="currency-error" aria-invalid="true" readonly></textarea>
					<fieldset class="flex align-center gap-md">
						<input
							type="text"
							id="currency-name"
							name="currency-name"
							placeholder="Currency"
							aria-label="Currency"
							required>
						<label>
							<input
								id="currency-default"
								name="currency-default"
								type="checkbox"
								role="switch">
							Default
						</label>
					</fieldset>
				</form>
				<footer>
					<button id="currency-open-delete-btn" class="float-left secondary">Delete</button>
					<button id="currency-delete-btn" class="float-left danger hide">Delete?</button>
					<button class="toggle-modal secondary" data-target="currency-modal">Cancel</button>
					<button id="currency-submit" data-target="currency-modal" form="currency-form">Submit</button>
				</footer>
			</article>
		</dialog>

		<dialog id="transaction-modal">
			<article>
				<header>
					<button class="toggle-modal" aria-label="Close" rel="prev" data-target="transaction-modal"></button>
					<h2 id="transaction-title">Transaction</h2>
				</header>
				<form id="transaction-form">
					<input type="hidden" id="transaction-id" name="transaction-id" value="">
					<input type="hidden" id="transaction-delete" name="transaction-delete" value="">
					<textarea id="transaction-error" class="hide" name="transaction-error" aria-invalid="true" readonly></textarea>
					<fieldset role="group">
						<input
							type="date"
							id="transaction-date"
							name="transaction-date"
							aria-label="Date"
							required>
						<label>
							<input
								id="transaction-flag"
								name="transaction-flag"
								type="checkbox"
								role="switch"></label>
						<input
							type="text"
							id="transaction-payee"
							name="transaction-payee"
							list="payee-datalist"
							placeholder="Payee"
							aria-label="Payee"
							required>
						<input
							type="text"
							id="transaction-notes"
							name="transaction-notes"
							placeholder="Notes"
							aria-label="Notes">
						<hr>
					</fieldset>
					<fieldset>
						<div role="group" class="transaction-posting transaction-posting-0 pl-btn">
							<input
								type="hidden"
								class="transaction-posting-id">
							<input
								type="hidden"
								class="transaction-posting-account-id">
							<input
								type="text"
								class="transaction-posting-account"
								list="account-datalist"
								placeholder="Account"
								aria-label="Account"
								required>
							<input
								type="text"
								class="transaction-posting-amount"
								placeholder="Amount"
								aria-label="Amount"
								required>
							<select
								class="transaction-posting-currency currency-select"
								aria-label="Currency"
								required></select>
						</div>
						<div role="group" class="transaction-posting transaction-posting-1 pl-btn">
							<input
								type="hidden"
								class="transaction-posting-id">
							<input
								type="hidden"
								class="transaction-posting-account-id">
							<input
								type="text"
								class="transaction-posting-account"
								list="account-datalist"
								placeholder="Account"
								aria-label="Account"
								required>
							<input
								type="text"
								class="transaction-posting-amount"
								placeholder="Amount"
								aria-label="Amount"
								required>
							<select
								class="transaction-posting-currency currency-select"
								aria-label="Currency"
								required></select>
						</div>
						<div id="transaction-postings"></div>
					</fieldset>
					<input type="button" id="transaction-add-posting-btn" value="Add Split">
				</form>
				<footer>
					<button id="transaction-open-delete-btn" class="float-left secondary">Delete</button>
					<button id="transaction-delete-btn" class="float-left danger hide">Delete?</button>
					<button class="toggle-modal secondary" data-target="transaction-modal">Cancel</button>
					<button id="transaction-submit" data-target="transaction-modal" form="transaction-form">Submit</button>
				</footer>
			</article>
		</dialog>

		<datalist id="payee-datalist"></datalist>
		<datalist id="account-datalist"></datalist>
	</body>
</html>
