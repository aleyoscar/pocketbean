<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<meta http-equiv="X-UA-Compatible" content="ie=edge">
		<title>PocketBean</title>
		<link rel="stylesheet" href="pico.cyan.min.css">
		<link rel="stylesheet" href="style.css">
		<script src="scripts/pocketbase.umd.js" defer></script>
		<script src="scripts/helpers.js" defer></script>
		<script src="scripts/dom.js" defer></script>
		<script src="scripts/constants.js" defer></script>
		<script src="scripts/modal.js" defer></script>
		<script src="scripts/components.js" defer></script>
		<script src="scripts/render.js" defer></script>
		<script src="scripts/auth.js" defer></script>
		<script src="scripts/manage.js" defer></script>
		<script src="scripts/events.js" defer></script>
		<script src="index.js" defer></script>
	</head>
	<body>
		<div id="wrapper" class="container">
			<header>
				<nav class="flex space-between">
					<ul>
						<li><strong>PocketBean</strong></li>
					</ul>
					<ul>
						<li>
							<details class="dropdown">
								<summary id="account"></summary>
								<ul dir="rtl">
									<li><a id="logout" class="pointer">Logout</a></li>
								</ul>
							</details>
						</li>
					</ul>
				</nav>
			</header>
			<main class="grid grid-xxs">
				<aside>
					<article>
						<nav>
							<ul>
								<li>
									<a id="accounts-btn" class="pointer aside-btn secondary" data-section="accounts">Accounts</a>
								</li>
								<li>
									<a id="transactions-btn" class="pointer aside-btn" data-section="transactions">Transactions</a>
								</li>
							</ul>
						</nav>
					</article>
				</aside>
				<section id="accounts" class="hide">
					<h2>Accounts</h2>
					<table>
						<thead>
							<tr>
								<th scope="col">Account</th>
							</tr>
						</thead>
						<tbody id="account-list"></tbody>
					</table>
				</section>
				<section id="transactions">
					<h2>Transactions</h2>
					<button id="transaction-add-btn">Add</button>
					<table>
						<thead>
							<tr>
								<th scope="col">Date</th>
								<th scope="col">Flag</th>
								<th scope="col">Payee</th>
								<th scope="col">Narration</th>
								<th scope="col">Tags</th>
								<th scope="col">Links</th>
								<th scope="col">Amount</th>
							</tr>
						</thead>
						<tbody id="transaction-list"></tbody>
					</table>
				</section>
			</main>
			<footer></footer>
		</div>

		<form id="login-form" class="container">
			<textarea id="login-error" class="hide" name="login-error" aria-invalid="true" readonly></textarea>
			<fieldset>
				<label>
					Username
					<input name="username" placeholder="Username" required>
				</label>
				<label>
					Password
					<input type="password" name="password" placeholder="Password" required>
				</label>
			</fieldset>
			<input type="submit" value="Login">
		</form>

		<dialog id="transaction-modal">
			<article>
				<header>
					<button class="toggle-modal" aria-label="Close" rel="prev" data-target="transaction-modal"></button>
					<h2 id="transaction-title">Transaction</h2>
				</header>
				<form id="transaction-form">
					<input type="hidden" id="transaction-id" name="transaction-id" value="">
					<input type="hidden" id="transaction-delete" name="transaction-delete" value="">
					<textarea id="transaction-error" class="hide" name="transaction-error" aria-invalid="true" readonly></textarea>
					<fieldset>
						<input
							type="date"
							id="transaction-date"
							name="transaction-date"
							aria-label="Date"
							required>
						<label>
							<input
								id="transaction-flag"
								name="transaction-flag"
								type="checkbox"
								role="switch">Cleared</label>
						<input
							type="text"
							id="transaction-payee"
							name="transaction-payee"
							list="payee-datalist"
							placeholder="Payee"
							aria-label="Payee">
						<input
							type="text"
							id="transaction-narration"
							name="transaction-narration"
							placeholder="Narration"
							aria-label="Narration">
						<input
							type="text"
							id="transaction-tags"
							name="transaction-tags"
							list="tags-datalist"
							placeholder="Tags"
							aria-label="Tags">
						<input
							type="text"
							id="transaction-links"
							name="transaction-links"
							list="links-datalist"
							placeholder="Links"
							aria-label="Links">
						<hr>
					</fieldset>
					<fieldset>
						<div role="group" class="transaction-posting transaction-posting-0">
							<input
								type="text"
								class="transaction-posting-account"
								list="account-datalist"
								placeholder="Account"
								aria-label="Account"
								required>
							<input
								type="text"
								class="transaction-posting-amount"
								placeholder="Amount"
								aria-label="Amount"
								required>
						</div>
						<div role="group" class="transaction-posting transaction-posting-1">
							<input
								type="text"
								class="transaction-posting-account"
								list="account-datalist"
								placeholder="Account"
								aria-label="Account"
								required>
							<input
								type="text"
								class="transaction-posting-amount"
								placeholder="Amount"
								aria-label="Amount"
								required>
						</div>
						<div id="transaction-postings"></div>
						<button id="transaction-add-posting-btn">Add Split</button>
					</fieldset>
				</form>
				<footer>
					<button id="transaction-open-delete-btn" class="float-left secondary">Delete</button>
					<button id="transaction-delete-btn" class="float-left danger hide">Delete?</button>
					<button class="toggle-modal secondary" data-target="transaction-modal">Cancel</button>
					<button id="transaction-submit" data-target="transaction-modal" form="transaction-form">Submit</button>
				</footer>
			</article>
		</dialog>

		<datalist id="payee-datalist"></datalist>
		<datalist id="tags-datalist"></datalist>
		<datalist id="links-datalist"></datalist>
		<datalist id="account-datalist"></datalist>
	</body>
</html>
